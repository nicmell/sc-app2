<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Bad Bindings (intentional errors)</title>
</head>
<body>
<sc-synthdef name="sine">
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.2"/>
    <sc-ugen name="osc" type="SinOsc">
        <sc-control name="freq" bind="freq"/>
    </sc-ugen>
    <sc-ugen name="sig" type="BinaryOpUGen" op="*">
        <sc-control name="a" bind="osc"/>
        <sc-control name="b" bind="amp"/>
    </sc-ugen>
    <sc-ugen name="out" type="Out">
        <sc-control name="bus" value="0"/>
        <sc-control name="channelsarray" bind="sig"/>
    </sc-ugen>
</sc-synthdef>
<sc-synth name="sine" bind="sine">
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.2"/>
</sc-synth>

<!-- Typo in bind path: "freqq" instead of "freq" -->
<sc-range type="knob" bind="sine.freqq" min="20" max="2000" step="1" diameter="48"/>

<!-- References non-existent synth -->
<sc-checkbox bind="nonexistent.mute" width="24" height="24"/>

<!-- Invalid display path -->
<sc-display bind="sine.volume"/>

<!-- Broken sc-if bind -->
<sc-if bind="sine.active">
    <span>Active</span>
</sc-if>
</body>
</html>
