<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Example Plugin</title>
</head>
<body>
<sc-synthdef name="sine">
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.2"/>
    <sc-control name="pan" value="0"/>
    <sc-control name="mute" value="0"/>
    <sc-ugen name="osc" type="SinOsc">
        <sc-control name="freq" bind="freq"/>
    </sc-ugen>
    <sc-ugen name="sig" type="BinaryOpUGen" op="*">
        <sc-control name="a" bind="osc"/>
        <sc-control name="b" bind="amp"/>
    </sc-ugen>
    <sc-ugen name="panned" type="Pan2">
        <sc-control name="in" bind="sig"/>
        <sc-control name="pos" bind="pan"/>
    </sc-ugen>
    <sc-ugen name="muted" type="BinaryOpUGen" op="*">
        <sc-control name="a" bind="panned"/>
        <sc-control name="b" bind="mute"/>
    </sc-ugen>
    <sc-ugen name="out" type="Out">
        <sc-control name="bus" value="0"/>
        <sc-control name="channelsarray" bind="muted"/>
    </sc-ugen>
</sc-synthdef>
<sc-synth name="s1" bind="sine">
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.2"/>
    <sc-control name="pan" value="0"/>
    <sc-control name="mute" value="0"/>
</sc-synth>
<label>
    <sc-run size="24"/>
</label>
<div class="controls">
    <div class="knobs">
        <label>
            <sc-range type="knob" bind="s1.freq" min="20" max="2000" step="1" diameter="48"/>
            <span><sc-display bind="s1.freq" format="%d Hz"/></span>
        </label>
        <label>
            <sc-range type="knob" bind="s1.amp" min="0" max="1" step="0.01" diameter="48"/>
            <span><sc-display bind="s1.amp" format="%.2f"/></span>
        </label>
    </div>
    <div class="sliders">
        <label>
            <span>Pan: <sc-display bind="s1.pan" format="%.2f"/></span>
            <sc-range type="slider" bind="s1.pan" min="-1" max="1" step="0.01" width="120" height="16"/>
        </label>
        <label>
            <sc-checkbox bind="s1.mute" width="24" height="24"/>
            <span>Mute</span>
        </label>
    </div>
</div>
</body>
</html>
