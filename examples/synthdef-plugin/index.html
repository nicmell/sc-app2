<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>SynthDef Plugin</title>
</head>
<body>

<sc-synthdef name="fm-sine">
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.2"/>
    <sc-control name="mod-freq" value="2"/>
    <sc-control name="mod-depth" value="200"/>
    <sc-ugen name="mod" type="SinOsc" rate="kr">
        <sc-control name="freq" bind="mod-freq"/>
    </sc-ugen>
    <sc-ugen name="mod-scaled" type="MulAdd" rate="kr">
        <sc-control name="in" bind="mod"/>
        <sc-control name="mul" bind="mod-depth"/>
        <sc-control name="add" bind="freq"/>
    </sc-ugen>
    <sc-ugen name="osc" type="SinOsc">
        <sc-control name="freq" bind="mod-scaled"/>
    </sc-ugen>
    <sc-ugen name="sig" type="BinaryOpUGen" op="*">
        <sc-control name="a" bind="osc"/>
        <sc-control name="b" bind="amp"/>
    </sc-ugen>
    <sc-ugen name="out" type="Out">
        <sc-control name="bus" value="0"/>
        <sc-control name="channelsarray" bind="sig"/>
    </sc-ugen>
</sc-synthdef>

<sc-synth name="fm" bind="fm-sine">
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.2"/>
    <sc-control name="mod-freq" value="2"/>
    <sc-control name="mod-depth" value="200"/>
</sc-synth>
<label>
    <sc-run size="24"/>
</label>
<div class="controls">
    <div class="knobs">
        <label>
            <sc-range type="knob" bind="fm.freq" min="20" max="2000" step="1" diameter="48"/>
            <span><sc-display bind="fm.freq" format="%d Hz"/></span>
        </label>
        <label>
            <sc-range type="knob" bind="fm.amp" min="0" max="1" step="0.01" diameter="48"/>
            <span><sc-display bind="fm.amp" format="%.2f"/></span>
        </label>
    </div>
    <div class="knobs">
        <label>
            <sc-range type="knob" bind="fm.mod-freq" min="0.1" max="20" step="0.1" diameter="48"/>
            <span>Mod: <sc-display bind="fm.mod-freq" format="%.1f Hz"/></span>
        </label>
        <label>
            <sc-range type="knob" bind="fm.mod-depth" min="0" max="1000" step="1" diameter="48"/>
            <span>Depth: <sc-display bind="fm.mod-depth" format="%d"/></span>
        </label>
    </div>
</div>
</body>
</html>
