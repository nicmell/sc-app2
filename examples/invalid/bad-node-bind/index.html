<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Bad Node Bind (intentional error)</title>
</head>
<body>
<sc-synthdef name="sine">
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.2"/>
    <sc-ugen name="osc" type="SinOsc">
        <sc-control name="freq" bind="freq"/>
    </sc-ugen>
    <sc-ugen name="sig" type="BinaryOpUGen" op="*">
        <sc-control name="a" bind="osc"/>
        <sc-control name="b" bind="amp"/>
    </sc-ugen>
    <sc-ugen name="out" type="Out">
        <sc-control name="bus" value="0"/>
        <sc-control name="channelsarray" bind="sig"/>
    </sc-ugen>
</sc-synthdef>
<sc-synth name="s1" bind="sine">
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.2"/>
</sc-synth>

<!-- INTENTIONAL: the bind path's node segment ("ghost") matches nothing in
     scope — resolveControlBind must fail with "does not match any node in
     scope" -->
<sc-range type="knob" bind="ghost.freq" min="20" max="2000" step="1" diameter="48"/>
</body>
</html>
