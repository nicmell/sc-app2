<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Conditional Plugin</title>
</head>
<body>
<!-- Tests sc-if (nameless parent) with controls binding to siblings -->
<sc-synthdef name="sine">
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.2"/>
    <sc-control name="gate" value="1"/>
    <sc-ugen name="osc" type="SinOsc">
        <sc-control name="freq" bind="freq"/>
    </sc-ugen>
    <sc-ugen name="env" type="Linen">
        <sc-control name="gate" bind="gate"/>
        <sc-control name="attacktime" value="0.01"/>
        <sc-control name="susLevel" value="1"/>
        <sc-control name="releasetime" value="0.1"/>
    </sc-ugen>
    <sc-ugen name="sig" type="BinaryOpUGen" op="*">
        <sc-control name="a" bind="osc"/>
        <sc-control name="b" bind="amp"/>
    </sc-ugen>
    <sc-ugen name="gated" type="BinaryOpUGen" op="*">
        <sc-control name="a" bind="sig"/>
        <sc-control name="b" bind="env"/>
    </sc-ugen>
    <sc-ugen name="out" type="Out">
        <sc-control name="bus" value="0"/>
        <sc-control name="channelsarray" bind="gated"/>
    </sc-ugen>
</sc-synthdef>

<sc-synth name="osc" bind="sine">
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.2"/>
    <sc-control name="gate" value="1"/>
</sc-synth>
<label>
    <sc-run size="24"/>
</label>

<div>
    <label>
        <span>Freq: <sc-display bind="osc.freq" format="%d Hz"/></span>
        <sc-range type="knob" bind="osc.freq" min="20" max="2000" step="1" diameter="48"/>
    </label>
    <label>
        <span>Amp: <sc-display bind="osc.amp" format="%.2f"/></span>
        <sc-range type="knob" bind="osc.amp" min="0" max="1" step="0.01" diameter="48"/>
    </label>
</div>

<!-- sc-if wraps controls — path should pass through the nameless sc-if -->
<sc-if bind="osc.gate" is-truthy="">
    <div>
        <h3>Gate is ON</h3>
        <label>
            <span>Gate: <sc-display bind="osc.gate" format="%d"/></span>
            <sc-checkbox bind="osc.gate"/>
        </label>
    </div>
</sc-if>
<sc-if bind="osc.gate" is-falsy="">
    <div>
        <h3>Gate is OFF — click to re-enable</h3>
        <label>
            <sc-checkbox bind="osc.gate"/>
        </label>
    </div>
</sc-if>
</body>
</html>
