<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Forward Reference Plugin</title>
</head>
<body>
<!-- Controls appear BEFORE the synth they bind to — tests on-demand resolve -->
<sc-synthdef name="sine">
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.2"/>
    <sc-ugen name="osc" type="SinOsc">
        <sc-control name="freq" bind="freq"/>
    </sc-ugen>
    <sc-ugen name="sig" type="BinaryOpUGen" op="*">
        <sc-control name="a" bind="osc"/>
        <sc-control name="b" bind="amp"/>
    </sc-ugen>
    <sc-ugen name="out" type="Out">
        <sc-control name="bus" value="0"/>
        <sc-control name="channelsarray" bind="sig"/>
    </sc-ugen>
</sc-synthdef>

<div>
    <h3>Controls (before synth)</h3>
    <label>
        <sc-run bind="s1" size="24"/>
    </label>
    <label>
        <span>Freq: <sc-display bind="s1.freq" format="%d Hz"/></span>
        <sc-range type="knob" bind="s1.freq" min="20" max="2000" step="1" diameter="48"/>
    </label>
    <label>
        <span>Amp: <sc-display bind="s1.amp" format="%.2f"/></span>
        <sc-range type="knob" bind="s1.amp" min="0" max="1" step="0.01" diameter="48"/>
    </label>
</div>

<!-- Synth defined AFTER the controls that reference it -->
<sc-synth name="s1" bind="sine">
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.2"/>
</sc-synth>
</body>
</html>
